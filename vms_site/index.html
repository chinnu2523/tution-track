<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS EduTech — Empowering Minds, Shaping Futures</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080a10;
            --text: #eef0f8;
            --blue: #4f8aff;
            --violet: #8b5cf6;
            --surface: #111520;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: url('vms_edutech_hero.png') center/cover no-repeat;
            padding: 20px;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(8,10,16,0.7), rgba(8,10,16,0.9));
        }
        .content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            text-align: center;
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--blue), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            word-spacing: -10px;
        }
        p {
            font-size: 1.2rem;
            color: #7c87a8;
            margin-bottom: 40px;
        }
        .cta {
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--blue), var(--violet));
            border-radius: 99px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }
        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 138, 255, 0.4);
        }
        nav {
            position: absolute;
            top: 0; width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; }
        .logo span { color: var(--blue); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">VMS<span>EduTech</span></div>
        <a href="https://tutiontrack.pythonanywhere.com" class="cta" style="padding: 8px 20px; font-size: 0.9rem;">Client Portal</a>
    </nav>
    <section class="hero">
        <div class="content">
            <h1>EMPOWERING MINDS.<br>SHAPING FUTURES.</h1>
            <p>Unlock your potential with the next generation of online learning. Experience innovative courses and cutting-edge technology tailored for the modern world.</p>
            <a href="#" class="cta">Get Started Now →</a>
        </div>
    </section>
</body>
</html>
