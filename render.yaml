services:
  - type: web
    name: tuition-track
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tuition-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: tuition-db
    plan: free
